server:
  port: 8123
  servlet:
    context-path: /api
    #cook 30天过期
    session:
      cookie:
        max-age: 2592000
spring:
  application:
    name: yu-picture-backend
    #数据库
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yu-picture
    username: root
    password: 4321
  # redsi 配置
  redis:
    database: 0
    host: 127.0.0.1
    port: 6379
    timeout: 5000
  #Session配置
  session:
    store-type: redis
    # session 30 天后过期
    timeout: 2592000
  #开放更大的文件体积
  servlet:
    multipart:
      max-file-size: 10MB
mybatis-plus:
  configuration:
    # MyBatis 配置
    map-underscore-to-camel-case: false
    #仅在开发环境打印日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete #全局逻辑删除字段
      logic-delete-value: 1 #逻辑已删除值
      logic-not-delete-value: 0 #逻辑未删除值

knife4j:
  enable: true
  openapi:
    title: 接口文档
    version: 1.0
    group:
      test1:
        group-name: 默认分组
        api-rule: package
        api-rule-resources:
          - com.yupi.yupicturebackend.controller
#对象存储配置
cos:
  client:
    host: "https://yupi2-1406977879.cos.ap-chengdu.myqcloud.com"
    region: "ap-chengdu"
    bucket: "yupi2-1406977879"
    secretId: ${secretId}
    secretKey: ${secretKey}

#阿里云ai
aliYunAi:
  apiKey: ${apiKey}